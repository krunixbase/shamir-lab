name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing ideas to the project.

  - type: input
    id: summary
    attributes:
      label: Feature Summary
      placeholder: "Add support for GF(2^16) fields"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important?
      placeholder: "This would allow testing larger field sizes."

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: "Extend utils.py with modular arithmetic for GF(2^16)."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
